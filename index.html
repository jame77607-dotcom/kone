<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kone VIP Admin Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Pyidaungsu', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border-top: 5px solid #0088cc;
        }

        .info-text {
            color: #333;
            line-height: 1.8;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .admin-id {
            display: block;
            background: #e1f5fe;
            color: #0088cc;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin: 15px 0;
            font-size: 18px;
        }

        .tg-link {
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .tg-link:hover {
            transform: scale(1.1);
        }

        .tg-icon {
            font-size: 60px;
            color: #0088cc;
            cursor: pointer;
        }

        .click-hint {
            display: block;
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="card">
        <p class="info-text">
            Kone VIP ၀င်ဖို့ Video ထဲက username ကိုရှာလို့မတွေ့တော့ရင် Admin Action ဖြစ်တဲ့ telegram username ကို ဒီ Site မှာအမြဲလာကြည့်ပါ။
        </p>

        <p class="info-text">လက်ရှိ Kone admin username</p>
        <span class="admin-id">@gangoquit</span>

        <p class="info-text">Telegram ပုံကိုနှိပ်ပြီး admin အကောင့်ကို တိုက်ရိုက်သွားပါ။</p>

        <a href="https://t.me/gangoquit" target="_blank" class="tg-link">
            <i class="fab fa-telegram tg-icon"></i>
            <span class="click-hint">Admin ဆီသို့ တိုက်ရိုက်သွားရန်နှိပ်ပါ</span>
        </a>
    </div>

</body>
</html>
